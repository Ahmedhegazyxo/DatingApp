<dialog #errorModal id="errorModal" class="modal" (cancel)="$event.preventDefault()">
  <div class="modal-box">
    <h3 class="text-lg font-bold">{{errorTitle()}}</h3>
    <p class="py-4">{{errorMessage()}}</p>
    <div class="modal-action gap-2 flex">
      @if(errorStatusCode() == 401)
      {
      <button (click)="navigateToLogin()" class="btn btn-primary">Login</button>
      }
      <button class="btn" (click)="hideModal()">Close</button>
    </div>
  </div>
</dialog>
