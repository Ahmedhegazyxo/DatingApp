<div class="w-full">

    <div class="flex items-center justify-end gap-2 text-sm">
        <span class="whitespace-nowrap">Previewing:</span>
        <select class="select select-xs w-auto min-w-0" [value]="currentPageSize()"
            (change)="pageSizeChanged(+$any($event.target).value)">
            @for (size of pageSizeOptions; track size; let i = $index;) {
            <option [value]="size" [disabled]="(pageSizeOptions[i-1] >= totalItemsCount())">{{ size }}</option>
            }
        </select>

        <span class="text-xs text-gray-500 whitespace-nowrap">
            of {{ totalItemsCount() }}
        </span>
    </div>

    <div class="flex my-2 gap-2 flex-wrap justify-center">
        @if(paginatedResult().body.length == 0){
        <div class="flex flex-col items-center gap-4">
            <div>
                <i class="fa-solid fa-dumpster text-7xl text-secondary"></i>
            </div>
            <div>
                No items to show
            </div>
        </div>
        }
        @else {

        @for(item of paginatedResult().body; track item)
        {
        @if(item != null){

        <ng-container [ngTemplateOutlet]="itemTemplate" [ngTemplateOutletContext]="{$implicit : item}"></ng-container>
        }
        }
        }
    </div>
    <div class="flex justify-center">
        <app-paginator (pageNumberChanged)="pageNumberChanged($event)" [pageSize]="currentPageSize"
            [currentPageNumber]="currentPageNumber" (pageSizeChanged)="pageSizeChanged($event)"
            [totalItemsCount]="totalItemsCount"></app-paginator>
    </div>
</div>
