
<div class="toast toast-right text-white cursor-pointer" >
@for (toastItem of toastList; track $index)
{
    <button class="{{toastClass(toastItem.severity)}}" (click)="toastCallback(toastItem)">
        <span>{{toastItem.title}}</span>
        <span>{{toastItem.description}}</span>
    </button>
    }
</div>
<button class="btn btn-primary" (click)="addToast()">Add Toast</button>
