<dialog #htmlDialogInstance class="modal" id="{{instance.id}}">
    <div class="modal-box bg-base-200">
        <div class="flex justify-between">
            <p class="text-xl">{{instance.title}}</p>
            <button class="btn"  (click)="onInstanceCancelButtonClicked()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div>
            <ng-template #host class="p-2"></ng-template>
        </div>
    </div>
</dialog>
