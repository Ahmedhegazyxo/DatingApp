<dialog #htmlDialogInstance class="modal" id="{{instance.id}}">
  <div class="modal-box bg-base-200 max-h-[90vh] flex flex-col">
    <div class="flex justify-between items-center">
      <p class="text-xl">{{instance.title}}</p>
      <button class="btn" (click)="onInstanceCancelButtonClicked()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="overflow-y-auto mt-2 flex-1 px-2 py-4">
      <ng-template #host ></ng-template>
    </div>

  </div>
</dialog>
