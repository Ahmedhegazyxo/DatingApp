<div class="text-center">
    <h1 class="text-6xl font-extralight">Hello, {{this.authStateService.userModel()?.firstName}}!</h1>
</div>
<section id="overview">
    <h1 class="text-6xl font-extralight mt-6 mb-10 text-center">Here are some matches you might like to see!</h1>
    <div class="flex justify-center gap-4 flex-wrap">
        @if(this.members().length == 0){
        <div class="flex flex-col items-center gap-4">
            <div>
                <i class="fa-solid fa-users text-7xl text-secondary"></i>
            </div>
            <div>
                No members yet
            </div>
        </div>
        }
        @else {
        @for(member of this.members(); track member){

        <app-member-card [memberModel]="member" (onMemberCardLiked)="likeMember($event)"></app-member-card>
        }
        }
    </div>
    <div class="mt-10 flex justify-center gap-2">
        <a href="/members" class="btn-link">Explore
        </a>
    </div>
</section>
