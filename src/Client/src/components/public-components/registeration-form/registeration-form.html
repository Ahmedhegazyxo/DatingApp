<form (ngSubmit)="onSubmit()" [formGroup]="formGroup" class="space-y-3">

  <div class="flex gap-3">
    <div class="flex-1 flex flex-col">
      <app-text-input type="email" formControlName="email" label="email" placeholder="Email"></app-text-input>
    </div>
    <div class="flex-1 flex flex-col">
      <app-phone-number-input formControlName="phoneNumber" label="Phone Number"
        placeholder="Phone Number"></app-phone-number-input>
    </div>
  </div>

  <div class="flex gap-3">
    <div class="flex-1 flex flex-col">
      <div class="flex-1 flex flex-col">
        <app-text-input type="text" formControlName="firstName" label="First Name"
          placeholder="First Name"></app-text-input>
      </div>
    </div>
    <div class="flex-1 flex flex-col">
      <app-text-input type="text" formControlName="lastName" label="Last Name" placeholder="Last Name"></app-text-input>
    </div>
  </div>

  <div class="flex gap-3">
    <div class="flex-1 flex flex-col">
      <app-text-input type="password" formControlName="password" label="Password"
        placeholder="Password"></app-text-input>
    </div>

    <div class="flex-1 flex flex-col">
      <app-text-input type="password" formControlName="confirmPassword" label="Confirm Password"
        placeholder="Confirm Password"></app-text-input>
    </div>
  </div>

  <div class="flex gap-3">
    <div class="flex-1 flex flex-col">
      <app-text-input type="text" formControlName="username" label="Username" placeholder="Username"></app-text-input>
    </div>

    <div class="flex-1 flex flex-col">
      <input formControlName="birthdate" name="birthdate" type="date" class="input">
    </div>
  </div>

  <div class="flex flex-col gap-1">
    <label>Gender</label>
    <div class="flex gap-4">
      <label class="flex items-center gap-1">
        <input type="radio" [value]="1" formControlName="gender">
        Male
      </label>
      <label class="flex items-center gap-1">
        <input type="radio" [value]="2" formControlName="gender">
        Female
      </label>
    </div>
  </div>
  <div class="flex justify-center">
    <button type="submit" class="btn btn-ghost" [disabled]="!this.formGroup.dirty || this.formGroup.invalid">
      Register
    </button>
  </div>
</form>
