<form (ngSubmit)="onSubmit()" [formGroup]="formGroup">
    <div class="space-y-4">
        <div class="w-2xs">
            <app-text-input formControlName="username" label="Username" placeholder="Username"></app-text-input>
        </div>
        <div class="w-2xs">
            <app-text-input type="password" formControlName="password" label="Password"
                placeholder="Password"></app-text-input>

        </div>
        <div class="flex flex-col items-center">
            <div>
                <button type="submit" class="btn btn-success shadow-none">Login</button>
            </div>
            <div class="p-2">
                <a href="/register" class="link text-ghost">don't have an account?</a>
            </div>
        </div>
    </div>
</form>
