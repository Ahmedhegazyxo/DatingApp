<form (ngSubmit)="onSubmit()" #loginForm="ngForm">
    <div class="space-y-4">
        <div class="w-2xs">
            <label for="Username">Username</label>
            <input [(ngModel)]="loginDto.Username" name="Username" type="text" class="input"
                placeholder="Username : eg. Johndoe1556">
        </div>
        <div class="w-2xs">
            <label for="Password">Password</label>
            <input [(ngModel)]="loginDto.Password" name="Password" type="password" class="input" placeholder="Password">
        </div>
        <div class="flex flex-col items-center"> 
            <div>
                <button type="submit" class="btn">Login</button>
            </div>
            <div>
                <a href="/register" class="link text-blue-500">don't have an account?</a>
            </div>
        </div>
    </div>
</form>
