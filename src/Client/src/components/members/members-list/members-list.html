<app-paginated-list [fetchFn]="getMembers" [itemTemplate]="memberCardTemplate" #paginatedList></app-paginated-list>
<ng-template #memberCardTemplate let-member>
    <div >
        @if(member != null){
            <app-member-card [memberModel]="member" (onMemberCardLiked)="likeUser($event)"></app-member-card>
        }
    </div>

</ng-template>
