<div class="flex gap-2 flex-wrap justify-center">
    @if(_membersService._members() != null)
    {
    @for(member of _membersService._members(); track member)
    {
    <app-member-card (onMemberCardClicked)="memberModelClicked($event)" [memberModel]="member"></app-member-card>
    }
    }
    @else{
    <div class="skeleton"></div>
    }
</div>
