<form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-3">

  <!-- Row -->
  <div class="flex gap-3">
    <div class="flex-1 flex flex-col">
      <label>Email</label>
      <input
        [(ngModel)]="_registerDto.email"
        name="email"
        type="email"
        class="input"
        placeholder="johndoe@gmail.com">
    </div>

    <div class="flex-1 flex flex-col">
      <label>Phone Number</label>
      <input
        [(ngModel)]="_registerDto.phoneNumber"
        name="phoneNumber"
        type="text"
        class="input"
        placeholder="Phone number">
    </div>
  </div>

  <!-- Row -->
  <div class="flex gap-3">
    <div class="flex-1 flex flex-col">
      <label>First Name</label>
      <input
        [(ngModel)]="_registerDto.firstName"
        name="firstName"
        type="text"
        class="input">
    </div>

    <div class="flex-1 flex flex-col">
      <label>Last Name</label>
      <input
        [(ngModel)]="_registerDto.lastName"
        name="lastName"
        type="text"
        class="input">
    </div>
  </div>

  <!-- Row -->
  <div class="flex gap-3">
    <div class="flex-1 flex flex-col">
      <label>Password</label>
      <input
        [(ngModel)]="_registerDto.password"
        name="password"
        type="password"
        class="input">
    </div>

    <div class="flex-1 flex flex-col">
      <label>Confirm Password</label>
      <input
        type="password"
        class="input">
    </div>
  </div>

  <!-- Row -->
  <div class="flex gap-3">
    <div class="flex-1 flex flex-col">
      <label>Username</label>
      <input
        [(ngModel)]="_registerDto.username"
        name="username"
        type="text"
        class="input">
    </div>

    <div class="flex-1 flex flex-col">
      <label>Birthdate</label>
      <input
        [(ngModel)]="_registerDto.birthdate"
        name="birthdate"
        type="date"
        class="input">
    </div>
  </div>

  <!-- Gender -->
  <div class="flex flex-col gap-1">
    <label>Gender</label>
    <div class="flex gap-4">
      <label class="flex items-center gap-1">
        <input type="radio" name="gender" [value]="0" [(ngModel)]="_registerDto.gender">
        Other
      </label>
      <label class="flex items-center gap-1">
        <input type="radio" name="gender" [value]="1" [(ngModel)]="_registerDto.gender">
        Male
      </label>
      <label class="flex items-center gap-1">
        <input type="radio" name="gender" [value]="2" [(ngModel)]="_registerDto.gender">
        Female
      </label>
    </div>
  </div>

  <div class="flex justify-center">
      <button type="submit" class="btn">
          Register
        </button>
    </div>

</form>
